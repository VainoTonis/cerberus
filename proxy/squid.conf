# Allow only explicitly listed domains; deny everything else.
# Squid uses CONNECT tunneling for HTTPS — sees hostname, not content.
# No SSL bumping required.

acl allowed_domains dstdomain .amazonaws.com
# Add more domains as needed:
# acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain .githubcopilot.com

http_access allow allowed_domains
http_access deny all

http_port 3128

# Suppress version info in error pages
httpd_suppress_version_string on
